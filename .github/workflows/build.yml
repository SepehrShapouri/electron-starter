name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  packages: write

env:
  AUTO_RELEASE_VERSION: 1.0.${{ github.run_number }}
  RELEASES_REPOSITORY: Sidejar/clawpilot-releases

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set CI app version
        run: npm version "${{ env.AUTO_RELEASE_VERSION }}" --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Type check
        continue-on-error: true
        run: npm run type-check

      - name: Lint code
        continue-on-error: true
        run: npm run lint

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_CERTIFICATE" || -z "$MACOS_CERTIFICATE_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Signing secrets missing. Failing build."
            exit 1
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/macos-signing.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/macos-signing.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Validate signing and notarization configuration
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if security find-identity -v -p codesigning build.keychain | grep -q "Developer ID Application"; then
            echo "Signing identity check: Developer ID Application found"
          else
            echo "Signing identity check: FAILED (Developer ID Application not found)"
            exit 1
          fi

          if [[ -n "$APPLE_ID" ]]; then
            echo "APPLE_ID: configured"
          else
            echo "APPLE_ID: missing"
            exit 1
          fi

          if [[ -n "$APPLE_TEAM_ID" ]]; then
            echo "APPLE_TEAM_ID: configured"
          else
            echo "APPLE_TEAM_ID: missing"
            exit 1
          fi

          if [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" || -n "$APPLE_ID_PASSWORD" ]]; then
            echo "Apple notarization password: configured"
          else
            echo "Apple notarization password: missing"
            exit 1
          fi

      - name: Build application
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make

      - name: List build output (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "Build output structure:"
          find out -type f -name "*" 2>/dev/null || echo "No out directory found"
          ls -la out/ 2>/dev/null || echo "No out directory"

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: electron-app-macos
          path: out/make/**/*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true) ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get package version
        id: package-version
        run: echo "version=${{ env.AUTO_RELEASE_VERSION }}" >> $GITHUB_OUTPUT

      - name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Determine release tag
        id: release-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.release_tag }}" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
            echo "name=Release ${{ inputs.release_tag }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "tag=v${{ steps.package-version.outputs.version }}" >> $GITHUB_OUTPUT
            echo "name=Release v${{ steps.package-version.outputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "name=Release ${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ steps.package-version.outputs.version }}-${{ steps.timestamp.outputs.timestamp }}" >> $GITHUB_OUTPUT
            echo "name=Release v${{ steps.package-version.outputs.version }} (${{ steps.timestamp.outputs.timestamp }})" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.name }}
          repository: ${{ env.RELEASES_REPOSITORY }}
          files: |
            electron-app-macos/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            🚀 **Manual Release**

            **Version:** ${{ steps.package-version.outputs.version }}
            **Build Date:** ${{ steps.timestamp.outputs.timestamp }}
            **Commit:** ${{ github.sha }}
            **Trigger:** ${{ github.event_name }}

            This release was manually triggered from the GitHub Actions interface.

            ## 📦 Downloads
            - **macOS**: `.dmg` installer and `.zip` portable
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
