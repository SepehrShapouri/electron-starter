name: Build and Release

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release for this repository'
        required: true
        default: false
        type: boolean
      release_tag:
        description: 'Release tag to use (defaults to package.json version)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        continue-on-error: true
        run: npm run type-check

      - name: Lint code
        continue-on-error: true
        run: npm run lint

      - name: Detect macOS signing configuration
        id: signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [[ -n "$MACOS_CERTIFICATE" && -n "$MACOS_CERTIFICATE_PASSWORD" && -n "$KEYCHAIN_PASSWORD" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing: enabled"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing: disabled (workflow will build unsigned artifacts)"
          fi

      - name: Import Apple signing certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/macos-signing.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/macos-signing.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Validate signing and notarization configuration
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if security find-identity -v -p codesigning build.keychain | grep -q "Developer ID Application"; then
            echo "Signing identity check: Developer ID Application found"
          else
            echo "Signing identity check: FAILED (Developer ID Application not found)"
            exit 1
          fi

          if [[ -n "$APPLE_ID" ]]; then
            echo "APPLE_ID: configured"
          else
            echo "APPLE_ID: missing"
            exit 1
          fi

          if [[ -n "$APPLE_TEAM_ID" ]]; then
            echo "APPLE_TEAM_ID: configured"
          else
            echo "APPLE_TEAM_ID: missing"
            exit 1
          fi

          if [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" || -n "$APPLE_ID_PASSWORD" ]]; then
            echo "Apple notarization password: configured"
          else
            echo "Apple notarization password: missing"
            exit 1
          fi

      - name: Build application
        env:
          ENABLE_MACOS_SIGNING: ${{ steps.signing.outputs.enabled }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run make

      - name: List build output (Unix)
        run: |
          echo "Build output structure:"
          find out -type f -name "*" 2>/dev/null || echo "No out directory found"
          ls -la out/ 2>/dev/null || echo "No out directory"

      - name: Upload artifacts (macOS)
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: out/make/**/*
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.create_release) ||
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get package version
        id: package-version
        run: |
          version=$(node -p 'require("./package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: release-tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.release_tag }}" ]]; then
            tag="${{ inputs.release_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="v${{ steps.package-version.outputs.version }}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=Release $tag" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.name }}
          files: |
            macos-build/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            Build artifacts generated from this starter repository.

            Version: ${{ steps.package-version.outputs.version }}
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
